<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NexusHub - API Navigator</title>
    <link rel="stylesheet" href="/ui/styles.css">
  </head>
  <body>
    <main class="container">
      <h1 class="title">NexusHub API Navigator</h1>

      <p class="subtitle">Quick access to API endpoints and docs</p>
<!-- we are building a simple API navigator -->
      <div class="grid">
        <a class="card" href="/auth/github/callback">Sign in (GitHub)</a>
      </div>
      if (isAuthenticated) {
        <div class="grid">
          <a class="card" href="/events">Events</a>
          <a class="card" href="/users">Users</a>
          <a class="card" href="/registrations">Registrations</a>
          <a class="card" href="/reviews">Reviews</a>
          <a href="card" href="/api-docs"> Swagger</a>
        </div>
      }
      <section class="info">
        <h2>Endpoints</h2>

      <section class="info">
        <h2>Preview</h2>
        <pre id="output">Click an endpoint to navigate or use the buttons above.</pre>
      </section>
    </main>

    <script src="/ui/app.js"></script>
  </body>
</html>
